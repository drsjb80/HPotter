name: CI / CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # Test and lint Python codebase with coverage reporting
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies including dev tools
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest coverage flake8

      - name: Run linting (flake8)
        run: |
          echo "Running flake8 on source code..."
          flake8 src/ test/ --max-line-length=120 || exit 0


      - name: Run tests (pytest)
        env:
          COVERAGE_FILE: .coverage.test

        run: coverage run --source=src -m pytest test/test_main.py -v --cov-report term || exit 0


      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-github-action@gh-pages
        with:
          files: ./coverage.xml

  # Security scanning for container images and common vulnerabilities
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Bandit security scanner
        run: |
          pip install bandit
          # Scan Python code for common vulnerabilities (skip tests directory)
          echo "Running bandit..."
          bandit --recursive src/ -f json || true

  # Check build status and create badge artifact URL
  publish-badge:
    runs-on: ubuntu-latest

    needs: [test-and-lint, security-scan]

    steps:
      - name: Report test results to Status Bot
        uses: mymindless/build-status-action@master
